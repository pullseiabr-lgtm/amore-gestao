<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff}
  #logo{display:inline-flex;align-items:center;gap:14px;padding:34px 46px;background:#fff}
  .mark{flex-shrink:0}
  .wm{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:118px;line-height:1;color:#9c1c20;letter-spacing:-1px;display:flex;align-items:center}
  .dot{display:inline-block;width:.56em;height:.56em;border-radius:50%;background:#9c1c20;margin:0 .02em;transform:translateY(.04em)}
</style></head>
<body>
  <div id="logo">
    <svg class="mark" width="148" height="104" viewBox="0 0 148 104">
      <path d="M10 95 L53 15 L96 95" fill="none" stroke="#9c1c20" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M52 95 L95 15 L138 95" fill="none" stroke="#9c1c20" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="wm">am<span class="dot"></span>re</div>
  </div>
</body></html>
