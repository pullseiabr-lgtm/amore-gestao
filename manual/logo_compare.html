<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Baloo+2:wght@700;800&family=Fredoka:wght@600;700&family=Quicksand:wght@700&family=Nunito:wght@900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;padding:24px 36px}
  .row{display:flex;align-items:center;gap:24px;margin-bottom:6px;height:96px}
  .lbl{width:150px;font:600 15px Arial;color:#333}
  .wm{font-size:74px;line-height:1;color:#9c1c20;display:flex;align-items:center;letter-spacing:-1px}
  .dot{display:inline-block;width:.6em;height:.6em;border-radius:50%;background:#9c1c20;margin:0 .03em;transform:translateY(.08em)}
  .f1{font-family:'Poppins';font-weight:800}
  .f2{font-family:'Baloo 2';font-weight:800}
  .f3{font-family:'Fredoka';font-weight:700}
  .f4{font-family:'Quicksand';font-weight:700}
  .f5{font-family:'Nunito';font-weight:900}
  .f6{font-family:'Montserrat';font-weight:800}
</style></head>
<body id="wrap">
  <div class="row"><div class="lbl">Poppins 800</div><div class="wm f1">am<span class="dot"></span>re</div></div>
  <div class="row"><div class="lbl">Baloo 2 800</div><div class="wm f2">am<span class="dot"></span>re</div></div>
  <div class="row"><div class="lbl">Fredoka 700</div><div class="wm f3">am<span class="dot"></span>re</div></div>
  <div class="row"><div class="lbl">Quicksand 700</div><div class="wm f4">am<span class="dot"></span>re</div></div>
  <div class="row"><div class="lbl">Nunito 900</div><div class="wm f5">am<span class="dot"></span>re</div></div>
  <div class="row"><div class="lbl">Montserrat 800</div><div class="wm f6">am<span class="dot"></span>re</div></div>
</body></html>
